---
version: 0.2
env: 
  variables: 
    # Variables to be injected by codepipline
    SERVICE_NAME:
    REPO_NAME:

phases: 
  install:
    commands: 
      - echo "installing tools"
      - aws --version
      - docker --version
      - echo "$SERVICE_NAME"
      - echo "$REPO_NAME"
      - docker pull ghcr.io/aquasecurity/trivy:latest

  pre_build:
    commands: 
      - echo "Scan Code...."
      - docker run --rm -v $(pwd):/workspace ghcr.io/aquasecurity/trivy:latest fs /workspace --exit-code 1 --severity HIGH,CRITICAL --scanners vuln,secret
      - echo "logging into AWS ECR"
      - ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
      - COMMIT_HASH=$(echo $CODEBUILD_RESOLVED_SOURCE_VERSION | cut -c 1-7)

      - echo "ACCOUNT ID is $ACCOUNT_ID"
      - echo "commit hash is $COMMIT_HASH"

      - |
        aws ecr get-login-password --region $AWS_DEFAULT_REGION \
        | docker login --username AWS --password-stdin \
        $ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com

  build:
    commands:
      - echo "Building Docker image"

      - IMAGE_URI=$ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com/$REPO_NAME
      - echo "$IMAGE_URI"

      - docker build --build-arg APP_NAME=$SERVICE_NAME -t $IMAGE_URI .

      - docker tag $IMAGE_URI $IMAGE_URI:latest
      - docker tag $IMAGE_URI $IMAGE_URI:$COMMIT_HASH

  post_build:
    commands: 
      - echo "SCAN IMAGE...."
      - docker run --rm -v /var/run/docker.sock:/var/run/docker.sock ghcr.io/aquasecurity/trivy:latest image $IMAGE_URI:latest --exit-code 1 --severity HIGH,CRITICAL --scanners vuln,secret 
      
      - echo "Pushing Docker image to ECR---"
      - docker push $IMAGE_URI:latest

      - echo "Create task definition revision"
      - cp image-definition-template.json imagedefinitions.json
      - sed -i "s|<CONTAINER_NAME>|$SERVICE_NAME|g" imagedefinitions.json
      - sed -i "s|<IMAGE_URI>|$IMAGE_URI:latest|g" imagedefinitions.json
      - cat imagedefinitions.json
      
      - echo "build completed"

artifacts: 
  files:
    - imagedefinitions.json